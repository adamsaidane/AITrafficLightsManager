# ============================================================
# Traffic RL Project - Master Configuration
# ============================================================

simulation:
  tl_id: "center"
  min_green_time: 10
  max_green_time: 60
  duration_buckets: [10, 20, 30, 45, 60]
  yellow_time: 3
  total_steps: 3600
  num_episodes: 500
  sumo_cfg: "intersection.sumocfg"
  net_file: "./SUMO intersection/intersection.net.xml"
  route_file: "./SUMO intersection/intersection.rou.xml"
  lanes:
    - "N_to_C_0"
    - "N_to_C_1"
    - "N_to_C_2"
    - "N_to_C_3"
    - "S_to_C_0"
    - "S_to_C_1"
    - "S_to_C_2"
    - "S_to_C_3"
    - "E_to_C_0"
    - "E_to_C_1"
    - "E_to_C_2"
    - "E_to_C_3"
    - "W_to_C_0"
    - "W_to_C_1"
    - "W_to_C_2"
    - "W_to_C_3"
  phases:
    0: "GggrGrrrGggrGrrr"
    1: "GrrrGggrGrrrGggr"
    2: "GggrGrrgGrrrGrrr"
    3: "GrrgGggrGrrrGrrr"
    4: "GrrrGrrrGggrGrrg"
    5: "GrrrGrrrGrrgGggr"
    6: "GrrgGrrrGrrgGrrr"
    7: "GrrrGrrgGrrrGrrg"

q_learning:
  alpha: 0.05                  # FIX: augmenté (0.01 trop lent pour 500 ep)
  gamma: 0.95
  epsilon_start: 1.0
  epsilon_decay: 0.998         # FIX: ralenti (0.995 → epsilon_min trop vite)
  epsilon_min: 0.05            # FIX: garde plus d'exploration résiduelle
  num_pressure_levels: 5

dqn:
  learning_rate: 0.0005
  gamma: 0.99
  epsilon_start: 1.0
  epsilon_end: 0.05            # FIX: 0.05 au lieu de 0.01 (évite collapse)
  epsilon_decay_steps: 400000  # FIX: ~111 épisodes × 3600 pas (était 50000 = 14 épisodes)
  batch_size: 64
  replay_buffer_size: 100000   # FIX: doublé pour meilleure diversité
  target_update_freq: 1000     # FIX: moins fréquent = cible plus stable
  min_replay_size: 5000        # FIX: plus de données avant d'apprendre
  double_dqn: true
  dueling: true
  gradient_clip: 10.0
  tau: 0.001                   # FIX: soft update plus lent = stabilité

ppo:
  learning_rate: 0.0001
  gamma: 0.99
  lam: 0.95
  clip_eps: 0.2
  # Entropy decay: starts high (forces all phases) → decays to floor
  entropy_coef_start: 0.5      # FIX: fort au debut pour contrer le mode collapse
  entropy_coef_end: 0.01       # plancher apres convergence
  entropy_coef: 0.5            # valeur courante (mise a jour par on_episode_end)
  # Residual epsilon: 5% de decisions aleatoires permanentes
  epsilon_residual: 0.05       # FIX: empeche le collapse sur 1 phase
  value_coef: 0.5
  update_epochs: 8             # FIX: plus de passes sur les donnees collectees
  n_steps: 1024                # FIX: plus court = gradient moins correle temporellement
  mini_batch_size: 128
  gradient_clip: 0.5

network:
  hidden_sizes: [256, 256]
  activation: "relu"

reward:
  wait_multiplier: -0.001      # FIX: réduit ×100 (évite gradients -7M qui explosent)
  throughput_multiplier: 5.0   # FIX: augmenté pour signal positif dominant
  queue_multiplier: -0.01      # FIX: réduit proportionnellement
  switch_penalty: -0.5         # FIX: réduit (ne pas sur-pénaliser les changements)
  normalize: true

paths:
  models_dir: "models"
  plots_dir: "plots"
  logs_dir: "logs"
  experiments_dir: "experiments"

logging:
  log_interval: 10              # episodes
  save_interval: 50             # episodes
  tensorboard: true
